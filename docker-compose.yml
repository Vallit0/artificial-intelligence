version: '3.8'

services:
  # ============================================
  # Aplicación Principal (Frontend + Backend)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://senoriales:senoriales@db:5432/senoriales
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-please}
      - APP_URL=${APP_URL:-http://localhost}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID}
      - ELEVENLABS_AGENT_PROSPECTING_PAREJA=${ELEVENLABS_AGENT_PROSPECTING_PAREJA}
      - ELEVENLABS_AGENT_PROSPECTING_FRUTAS=${ELEVENLABS_AGENT_PROSPECTING_FRUTAS}
      - ELEVENLABS_AGENT_PROSPECTING_NEUMATICOS=${ELEVENLABS_AGENT_PROSPECTING_NEUMATICOS}
      - ELEVENLABS_AGENT_PROSPECTING_RESTAURANTE=${ELEVENLABS_AGENT_PROSPECTING_RESTAURANTE}
      - ELEVENLABS_AGENT_PROSPECTING_PARQUEO=${ELEVENLABS_AGENT_PROSPECTING_PARQUEO}
      - ELEVENLABS_AGENT_EXAMEN_FINAL=${ELEVENLABS_AGENT_EXAMEN_FINAL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-Señoriales <onboarding@resend.dev>}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - senoriales-network

  # ============================================
  # Base de Datos PostgreSQL
  # ============================================
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=senoriales
      - POSTGRES_PASSWORD=senoriales
      - POSTGRES_DB=senoriales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senoriales -d senoriales"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - senoriales-network

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - senoriales-network

volumes:
  postgres_data:

networks:
  senoriales-network:
    driver: bridge
