version: '3.8'

services:
  # ============================================
  # Aplicación Principal (Frontend + Backend)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://senoriales:senoriales@db:5432/senoriales
      - CORS_ORIGIN=http://localhost,http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - senoriales-network

  # ============================================
  # Base de Datos PostgreSQL
  # ============================================
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=senoriales
      - POSTGRES_PASSWORD=senoriales
      - POSTGRES_DB=senoriales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senoriales -d senoriales"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - senoriales-network

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - senoriales-network

volumes:
  postgres_data:

networks:
  senoriales-network:
    driver: bridge
